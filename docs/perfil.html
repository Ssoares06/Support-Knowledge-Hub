<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Support Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-journal-bookmark-fill me-2"></i>Support Hub
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="#" onclick="logout()">Sair</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-header bg-white">
          <h4 class="mb-0"><i class="bi bi-gear me-2"></i>Configurações do Perfil</h4>
        </div>
        <div class="card-body p-4">

          <div id="alerta" class="alert d-none mb-4"></div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome</label>
            <input type="text" id="nome" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" id="email" class="form-control" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Nível</label>
            <input type="text" id="nivel" class="form-control" disabled>
          </div>

          <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-primary px-4" id="btnSalvar">
              <i class="bi bi-save me-2"></i>Salvar Alterações
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  const session = SessionManager.getInstance();
  if (!session.isAuthenticated()) window.location.href = 'login.html';

  document.addEventListener('DOMContentLoaded', async () => {
    const alerta = document.getElementById('alerta');

    try {
      const me = await API.getMe();
      document.getElementById('nome').value  = me.nome;
      document.getElementById('email').value = me.email;
      document.getElementById('nivel').value = me.nivel;
    } catch (err) {
      alerta.className = 'alert alert-danger';
      alerta.textContent = 'Erro ao carregar perfil.';
      alerta.classList.remove('d-none');
    }

    document.getElementById('btnSalvar').addEventListener('click', async () => {
      alerta.classList.add('d-none');
      const nome = document.getElementById('nome').value.trim();
      if (!nome) { alert('Nome não pode ficar vazio.'); return; }

      try {
        const me = await API.getMe();
        const res = await fetch(`/api/usuarios/${me.id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.token}`
          },
          body: JSON.stringify({ nome })
        });
        if (!res.ok) throw new Error((await res.json()).detail);
        const updated = await res.json();
        // Atualiza sessão local
        const u = session.usuario;
        u.nome = updated.nome;
        session.login(u, session.token);
        alerta.className = 'alert alert-success';
        alerta.textContent = 'Perfil atualizado com sucesso!';
        alerta.classList.remove('d-none');
      } catch (err) {
        alerta.className = 'alert alert-danger';
        alerta.textContent = err.message || 'Erro ao salvar.';
        alerta.classList.remove('d-none');
      }
    });
  });
</script>
</body>
</html>
