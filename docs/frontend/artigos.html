<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base de Conhecimento — Support Knowledge Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">
      <i class="bi bi-journal-bookmark-fill me-2"></i>Support Knowledge Hub
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="artigos.html">Base de Conhecimento</a></li>
        <li class="nav-item"><a class="nav-link" href="criar-artigo.html"><i class="bi bi-plus-circle me-1"></i>Novo Artigo</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="usuarioDropdown" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> Entrar
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="perfil.html"><i class="bi bi-gear me-2"></i>Perfil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container main-wrapper py-4">

  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h2 class="fw-bold m-0"><i class="bi bi-journal-text text-primary me-2"></i>Base de Conhecimento</h2>
    </div>
    <div class="col-md-6 text-md-end mt-3 mt-md-0">
      <a href="criar-artigo.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Adicionar Solução
      </a>
    </div>
  </div>

  <div class="row">

    <!-- Sidebar Filtros -->
    <div class="col-lg-3 mb-4">
      <div class="filter-sidebar">
        <h5 class="fw-bold mb-3 border-bottom pb-2">Filtros</h5>
        <form id="form-filtro">
          <div class="mb-3">
            <label for="filtro-termo" class="form-label small text-muted">Buscar termo</label>
            <input type="text" class="form-control" id="filtro-termo" placeholder="Ex: erro 500">
          </div>
          <div class="mb-3">
            <label for="filtro-sistema" class="form-label small text-muted">Sistema</label>
            <select class="form-select" id="filtro-sistema">
              <option value="">Todos os Sistemas</option>
              <option value="GLPI">GLPI</option>
              <option value="Colmeia">Colmeia</option>
              <option value="Infraestrutura">Infraestrutura</option>
              <option value="Redes">Redes</option>
              <option value="MV">MV</option>
              <option value="Windows">Windows</option>
            </select>
          </div>
          <div class="mb-4">
            <label for="filtro-categoria" class="form-label small text-muted">Categoria</label>
            <select class="form-select" id="filtro-categoria">
              <option value="">Todas as Categorias</option>
            </select>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Aplicar Filtros</button>
            <button type="reset" class="btn btn-light border">Limpar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Lista -->
    <div class="col-lg-9">
      <div class="row g-4" id="artigos-lista">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary"></div>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container"><p class="mb-0">&copy; 2024 Support Knowledge Hub</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
