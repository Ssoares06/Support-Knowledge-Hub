<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Support Knowledge Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center py-4">
          <h3 class="mb-0"><i class="bi bi-lock-fill me-2"></i>Support Knowledge Hub</h3>
          <p class="mb-0 small opacity-75">Sistema de Suporte Técnico</p>
        </div>
        <div class="card-body p-5">

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" class="form-control form-control-lg" id="email"
                     placeholder="seu@email.com" required autofocus>
            </div>
            <div class="mb-4">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" class="form-control form-control-lg" id="senha"
                     placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100" id="btnLogin">
              Entrar
            </button>
          </form>

          <div id="alertaErro" class="alert alert-danger d-none mt-3" role="alert"></div>

          <hr class="my-4">
          <p class="text-center mb-0">
            Não tem conta? <a href="registro.html" class="text-primary fw-bold">Criar conta</a>
          </p>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redireciona se já estiver logado
  if (SessionManager.getInstance().isAuthenticated()) {
    window.location.href = 'index.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const alerta = document.getElementById('alertaErro');
    const btn = document.getElementById('btnLogin');

    alerta.classList.add('d-none');
    btn.disabled = true;
    btn.textContent = 'Entrando…';

    try {
      const data = await API.login(email, senha);
      // Busca dados do usuário com o token recém-gerado
      localStorage.setItem('token', data.access_token);
      const usuario = await API.getMe();
      SessionManager.getInstance().login(usuario, data.access_token);
      window.location.href = 'index.html';
    } catch (err) {
      alerta.textContent = err.message || 'E-mail ou senha incorretos.';
      alerta.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
