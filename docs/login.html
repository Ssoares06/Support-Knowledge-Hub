<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Support Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="logo.png" alt="Support Hub Logo">
      <h4>Support Hub</h4>
      <p style="color: var(--text-muted); font-size: .9rem; margin: 0;">Sistema de Suporte Técnico</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control form-control-lg" id="email"
               placeholder="seu@email.com" required autofocus>
      </div>
      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control form-control-lg" id="senha"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100" id="btnLogin">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <div id="alertaErro" class="alert alert-danger d-none mt-3" role="alert"></div>

    <hr class="my-4">
    <p class="text-center mb-0" style="color: var(--text-secondary); font-size: .93rem;">
      Não tem conta?
      <a href="registro.html" class="fw-bold" style="color: var(--teal-main);">Criar conta</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (SessionManager.getInstance().isAuthenticated()) {
    window.location.href = 'index.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const alerta = document.getElementById('alertaErro');
    const btn = document.getElementById('btnLogin');

    alerta.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando…';

    try {
      const data = await API.login(email, senha);
      localStorage.setItem('token', data.access_token);
      const usuario = await API.getMe();
      SessionManager.getInstance().login(usuario, data.access_token);
      window.location.href = 'index.html';
    } catch (err) {
      alerta.textContent = err.message || 'E-mail ou senha incorretos.';
      alerta.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
    }
  });
</script>
</body>
</html>
