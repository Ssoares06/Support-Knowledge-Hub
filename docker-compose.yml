version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: support_hub_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: support_hub_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support_hub_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/support_hub
      MONGODB_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: support_hub_logs
      SECRET_KEY: troque-esta-chave-em-producao
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started

volumes:
  postgres_data:
  mongodb_data:
